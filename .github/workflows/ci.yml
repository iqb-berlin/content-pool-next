name: CI

on:
  push:
    branches: [master, develop]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx prettier --check "src/**/*.ts" "test/**/*.ts"

  frontend-lint:
    name: Frontend Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx prettier --check "src/**/*.{ts,html,scss}"

  release-metadata:
    name: Release Metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: ./scripts/check-release-metadata.sh
      - run: python3 -m unittest scripts/test_release_manifest.py
      - run: ./scripts/test-deployment-scripts.sh

  backend-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run test

  backend-e2e:
    name: Backend E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_DB: contentpool
          POSTGRES_USER: contentpool
          POSTGRES_PASSWORD: contentpool_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U contentpool -d contentpool"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: contentpool
      DB_PASSWORD: contentpool_dev
      DB_DATABASE: contentpool
      DB_SYNCHRONIZE: true
      DB_RUN_MIGRATIONS: false
      JWT_SECRET: ci-test-secret-at-least-32-characters
      CORS_ORIGIN: http://localhost:4200
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run test:e2e

  migration-test:
    name: Database Migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_DB: contentpool_migrations
          POSTGRES_USER: contentpool
          POSTGRES_PASSWORD: contentpool_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U contentpool -d contentpool_migrations"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: contentpool
      DB_PASSWORD: contentpool_dev
      DB_DATABASE: contentpool_migrations
      DB_SYNCHRONIZE: false
      DB_RUN_MIGRATIONS: false
      JWT_SECRET: ci-test-secret-at-least-32-characters
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run migration:run
      - run: npm run migration:revert
      - run: npm run migration:run
      - name: Verify upgrade and previous-backend compatibility
        working-directory: ${{ github.workspace }}
        env:
          POSTGRES_SERVICE_ID: ${{ job.services.postgres.id }}
        run: |
          previous_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -Ev -- '-rc\.' | head -n 1)"
          if [[ -z "$previous_tag" ]]; then
            echo "No previous stable release tag; compatibility test skipped"
            exit 0
          fi
          upgrade_dir="${RUNNER_TEMP}/content-pool-previous-release"
          docker exec "$POSTGRES_SERVICE_ID" createdb -U contentpool contentpool_upgrade
          git worktree add --detach "$upgrade_dir" "$previous_tag"
          npm --prefix "$upgrade_dir/backend" ci
          DB_DATABASE=contentpool_upgrade npm --prefix "$upgrade_dir/backend" run migration:run
          DB_DATABASE=contentpool_upgrade npm --prefix backend run migration:run
          docker exec -i "$POSTGRES_SERVICE_ID" psql -v ON_ERROR_STOP=1 \
            -U contentpool -d contentpool_upgrade <<'SQL'
          insert into acp (id, package_id, name)
          values ('11111111-1111-4111-8111-111111111111', 'compatibility-fixture', 'Compatibility fixture');
          insert into item_response_states (acp_id, item_id, unit_id, response_data)
          values ('11111111-1111-4111-8111-111111111111', 'item-1', 'unit-1', '{}');
          insert into users (id, username)
          values ('22222222-2222-4222-8222-222222222222', 'keycloak-only-compatibility-user');
          do $$
          begin
            if not exists (
              select 1 from item_response_states
              where acp_id = '11111111-1111-4111-8111-111111111111'
                and row_key = 'unit-1::item-1'
            ) then
              raise exception 'previous-backend write compatibility failed';
            end if;
            if not exists (
              select 1 from information_schema.columns
              where table_schema = 'public'
                and table_name = 'users'
                and column_name = 'password_hash'
            ) then
              raise exception 'users.password_hash was removed before the rollback compatibility window ended';
            end if;
            if (
              select password_hash from users
              where id = '22222222-2222-4222-8222-222222222222'
            ) is distinct from '' then
              raise exception 'Keycloak-only user insert did not receive the legacy-compatible empty password hash';
            end if;
          end $$;
          SQL
          npm --prefix "$upgrade_dir/backend" run build
          (
            cd "$upgrade_dir/backend"
            NODE_ENV=production PORT=3001 DB_DATABASE=contentpool_upgrade DB_RUN_MIGRATIONS=false \
              npm run start:prod >"${RUNNER_TEMP}/previous-backend.log" 2>&1 &
            echo $! >"${RUNNER_TEMP}/previous-backend.pid"
          )
          ready=0
          for attempt in {1..30}; do
            if curl -fsS http://localhost:3001/api/health/ready >/dev/null; then
              ready=1
              break
            fi
            sleep 2
          done
          kill "$(cat "${RUNNER_TEMP}/previous-backend.pid")" 2>/dev/null || true
          if [[ "$ready" -ne 1 ]]; then
            cat "${RUNNER_TEMP}/previous-backend.log"
            echo "Previous backend ${previous_tag} cannot run on the upgraded schema" >&2
            exit 1
          fi

  backup-restore-test:
    name: Backup and Restore Drill
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: ./scripts/test-backup-restore.sh

  frontend-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test -- --run

  browser-e2e:
    name: Browser E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_DB: contentpool_e2e
          POSTGRES_USER: contentpool
          POSTGRES_PASSWORD: contentpool_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U contentpool -d contentpool_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: contentpool
      DB_PASSWORD: contentpool_dev
      DB_DATABASE: contentpool_e2e
      DB_SYNCHRONIZE: true
      DB_RUN_MIGRATIONS: false
      JWT_SECRET: ci-test-secret-at-least-32-characters
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run e2e
        working-directory: frontend
        env:
          BROWSER_E2E_USE_EXISTING_DATABASE: true
          BROWSER_E2E_DATABASE_PORT: 5432
      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          retention-days: 7

  backend-build:
    name: Backend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  security:
    name: Dependency and Source Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm audit --audit-level=critical
        working-directory: backend
      - run: npm ci
        working-directory: frontend
      - run: npm audit --audit-level=critical
        working-directory: frontend
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  release-gate:
    name: release-gate
    if: always()
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - frontend-lint
      - release-metadata
      - backend-test
      - backend-e2e
      - migration-test
      - backup-restore-test
      - frontend-test
      - browser-e2e
      - backend-build
      - frontend-build
      - security
    steps:
      - name: Require every release check
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          failures="$(jq -r 'to_entries[] | select(.value.result != "success") | "\(.key)=\(.value.result)"' <<< "$NEEDS_JSON")"
          if [[ -n "$failures" ]]; then
            printf 'Release gate failed:\n%s\n' "$failures" >&2
            exit 1
          fi

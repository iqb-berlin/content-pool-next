# Supplemental validation for the GitHub-hosted repository.
# GitHub Actions is the only release authority and the only publisher to GHCR.

stages:
  - build
  - test
  - lint
  - audit
  - scan-dependencies

image: node:22-slim@sha256:6c74791e557ce11fc957704f6d4fe134a7bc8d6f5ca4403205b2966bd488f6b3

include:
  - template: Jobs/Dependency-Scanning.latest.gitlab-ci.yml

.validation_rules:
  rules:
    - if: $CI_EXTERNAL_PULL_REQUEST_TARGET_BRANCH_NAME == "develop"
    - if: $CI_EXTERNAL_PULL_REQUEST_TARGET_BRANCH_NAME == "master"
    - if: $CI_COMMIT_BRANCH && $CI_PIPELINE_SOURCE != "external_pull_request_event"
    - when: never

.backend:
  extends: .validation_rules
  before_script:
    - cd backend
    - npm ci --cache .npm --prefer-offline --no-fund
  cache:
    key:
      files:
        - backend/package-lock.json
    paths:
      - backend/.npm/

.frontend:
  extends: .validation_rules
  before_script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline --no-fund
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/.npm/

release-metadata:
  stage: build
  extends: .validation_rules
  script:
    - ./scripts/check-release-metadata.sh

build-backend:
  stage: build
  extends: .backend
  script:
    - npm run build

build-frontend:
  stage: build
  extends: .frontend
  script:
    - npm run build -- --configuration production

test-backend:
  stage: test
  extends: .backend
  script:
    - npm run test -- --runInBand

test-backend-e2e:
  stage: test
  extends: .backend
  services:
    - name: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
      alias: db
  variables:
    NODE_ENV: test
    DB_HOST: db
    DB_PORT: "5432"
    DB_USERNAME: contentpool
    DB_PASSWORD: contentpool_dev
    DB_DATABASE: contentpool
    POSTGRES_USER: contentpool
    POSTGRES_PASSWORD: contentpool_dev
    POSTGRES_DB: contentpool
    DB_SYNCHRONIZE: "true"
    DB_RUN_MIGRATIONS: "false"
    JWT_SECRET: ci-test-secret-at-least-32-characters
    CORS_ORIGIN: http://localhost:4200
  script:
    - npm run test:e2e

test-migrations:
  stage: test
  extends: .backend
  services:
    - name: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
      alias: db
  variables:
    NODE_ENV: test
    DB_HOST: db
    DB_PORT: "5432"
    DB_USERNAME: contentpool
    DB_PASSWORD: contentpool_dev
    DB_DATABASE: contentpool
    POSTGRES_USER: contentpool
    POSTGRES_PASSWORD: contentpool_dev
    POSTGRES_DB: contentpool
    DB_SYNCHRONIZE: "false"
    DB_RUN_MIGRATIONS: "false"
  script:
    - npm run migration:run
    - npm run migration:revert
    - npm run migration:run

test-frontend:
  stage: test
  extends: .frontend
  script:
    - npm run test -- --run

lint-backend:
  stage: lint
  extends: .backend
  script:
    - npm run lint
    - npx prettier --check "src/**/*.ts" "test/**/*.ts"

lint-frontend:
  stage: lint
  extends: .frontend
  script:
    - npm run lint
    - npx prettier --check "src/**/*.{ts,html,scss}"

audit-backend:
  stage: audit
  extends: .backend
  script:
    - npm audit --audit-level critical

audit-frontend:
  stage: audit
  extends: .frontend
  script:
    - npm audit --audit-level critical

gemnasium-dependency_scanning:
  stage: scan-dependencies
  rules:
    - if: $CI_EXTERNAL_PULL_REQUEST_TARGET_BRANCH_NAME == "master"
    - when: never

# Production Docker Compose for IQB ContentPool
services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD must be set}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - keycloak-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    entrypoint: ["/opt/keycloak/bin/kc.sh"]
    command: ["start", "--import-realm"]
    environment:
      # Database configuration
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD must be set}
      # Hostname configuration
      # IP Mode: leave empty or set to your IP
      # Domain Mode: set to your auth domain (e.g., auth.yourdomain.com)
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-}
      KC_HOSTNAME_STRICT: ${KEYCLOAK_HOSTNAME_STRICT:-true}
      KC_HOSTNAME_STRICT_BACKCHANNEL: ${KEYCLOAK_HOSTNAME_STRICT_BACKCHANNEL:-false}
      # HTTP/HTTPS settings
      # IP Mode: KC_HTTP_ENABLED=true, KC_HOSTNAME_STRICT_HTTPS=false
      # Domain Mode (reverse proxy): KC_HTTP_ENABLED=true, KC_HOSTNAME_STRICT_HTTPS=true
      KC_HTTP_ENABLED: ${KC_HTTP_ENABLED:-true}
      KC_HOSTNAME_STRICT_HTTPS: ${KC_HOSTNAME_STRICT_HTTPS:-true}
      # Proxy mode
      # IP Mode: KC_PROXY=none
      # Domain Mode: KC_PROXY=edge (if behind nginx with HTTPS)
      KC_PROXY: ${KC_PROXY:-edge}
      KC_HEALTH_ENABLED: "true"
      # Admin credentials - MUST be changed from defaults
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD must be set}
    # Port exposure - only needed for IP mode without reverse proxy
    # In domain mode with nginx, Keycloak is accessed via proxy (no direct port needed)
    ports:
      - ${KEYCLOAK_PORT_EXPOSE:-127.0.0.1:8080:8080}
    depends_on:
      keycloak-db:
        condition: service_healthy
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - keycloak-network
      - app-network

  content-pool-db:
    image: postgres:16-alpine
    container_name: content-pool-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - content-pool-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - app-network

  content-pool-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: content-pool-api
    depends_on:
      content-pool-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: content-pool-db
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:?POSTGRES_USER must be set}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      DB_DATABASE: ${POSTGRES_DB:?POSTGRES_DB must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      FILE_STORAGE_PATH: /app/uploads
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN must be set}
      # OIDC Configuration (optional)
      # Internal URL for backend-to-keycloak communication
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://keycloak:8080/realms/iqb}
      # Public URL for frontend browser redirects (must be accessible from browser)
      OIDC_PUBLIC_ISSUER_URL: ${OIDC_PUBLIC_ISSUER_URL}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:?OIDC_CLIENT_ID must be set}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:?OIDC_REDIRECT_URI must be set}
      OIDC_SCOPE: ${OIDC_SCOPE:-openid profile email}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      DB_RUN_MIGRATIONS: ${DB_RUN_MIGRATIONS:-true}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      SEED_DEFAULT_ADMIN: ${SEED_DEFAULT_ADMIN:-false}
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    # Kein Port nach außen – läuft hinter Nginx
    networks:
      - app-network
      - keycloak-network

  content-pool-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: content-pool-web
    restart: unless-stopped
    # Kein Port nach außen – läuft hinter Nginx
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: content-pool-nginx
    ports:
      - "${APP_PORT:-80}:80"
      # - "443:443"  # Uncomment when using HTTPS with valid certificates
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      # - /etc/letsencrypt:/etc/letsencrypt:ro   # Uncomment for HTTPS with Let's Encrypt
    depends_on:
      - content-pool-api
      - content-pool-web
      - keycloak
    networks:
      - app-network
      - keycloak-network
    restart: unless-stopped

volumes:
  content-pool-db-data:
  uploads:
  keycloak-db-data:

networks:
  app-network:
  keycloak-network:

# Production Docker Compose for IQB ContentPool
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-contentpool}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-contentpool_prod}
      POSTGRES_DB: ${DB_DATABASE:-contentpool}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-contentpool}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-contentpool}
      DB_PASSWORD: ${DB_PASSWORD:-contentpool_prod}
      DB_DATABASE: ${DB_DATABASE:-contentpool}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      FILE_STORAGE_PATH: /app/uploads
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend-build
    restart: unless-stopped

  frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    volumes:
      - frontend-dist:/usr/share/nginx/html

volumes:
  pgdata:
  uploads:
  frontend-dist:

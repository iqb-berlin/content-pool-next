# Production Docker Compose for IQB ContentPool
services:
  content-pool-db:
    image: postgres:16-alpine
    container_name: content-pool-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - content-pool-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  content-pool-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: content-pool-api
    depends_on:
      content-pool-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: content-pool-db
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      FILE_STORAGE_PATH: /app/uploads
      CORS_ORIGIN: ${CORS_ORIGIN}
      # OIDC Configuration (optional)
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI}
      OIDC_SCOPE: ${OIDC_SCOPE:-openid profile email}
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    # Kein Port nach außen – läuft hinter Nginx

  content-pool-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: content-pool-web
    restart: unless-stopped
    # Kein Port nach außen – läuft hinter Nginx

  nginx:
    image: nginx:alpine
    container_name: content-pool-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro   # für HTTPS
    depends_on:
      - content-pool-api
      - content-pool-web
    restart: unless-stopped

volumes:
  content-pool-db-data:
  uploads:

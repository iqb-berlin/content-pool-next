# Production Docker Compose for IQB ContentPool - Pre-built Images
# This file pulls images from GitHub Container Registry (no build on server)
services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD must be set}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - keycloak-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    command: ${KEYCLOAK_COMMAND:-["start", "optimized", "--import-realm"]}
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD must be set}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-}
      KC_HOSTNAME_STRICT: ${KEYCLOAK_HOSTNAME_STRICT:-true}
      KC_HOSTNAME_STRICT_BACKCHANNEL: ${KEYCLOAK_HOSTNAME_STRICT_BACKCHANNEL:-true}
      KC_HTTP_ENABLED: ${KC_HTTP_ENABLED:-false}
      KC_HTTPS_PORT: 8443
      KC_HOSTNAME_STRICT_HTTPS: ${KC_HOSTNAME_STRICT_HTTPS:-true}
      KC_PROXY: ${KC_PROXY:-edge}
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD must be set}
    ports:
      - ${KEYCLOAK_PORT_EXPOSE:-127.0.0.1:8080:8080}
    depends_on:
      keycloak-db:
        condition: service_healthy
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - keycloak-network
      - app-network

  content-pool-db:
    image: postgres:16-alpine
    container_name: content-pool-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - content-pool-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - app-network

  content-pool-api:
    image: ghcr.io/iqb-berlin/content-pool-backend:${IMAGE_VERSION:-latest}
    container_name: content-pool-api
    depends_on:
      content-pool-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: content-pool-db
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      FILE_STORAGE_PATH: /app/uploads
      CORS_ORIGIN: ${CORS_ORIGIN}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://keycloak:8080/realms/iqb}
      OIDC_PUBLIC_ISSUER_URL: ${OIDC_PUBLIC_ISSUER_URL}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-contentpool}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI}
      OIDC_SCOPE: ${OIDC_SCOPE:-openid profile email}
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    networks:
      - app-network
      - keycloak-network

  nginx:
    # Frontend image includes nginx with the built Angular app
    image: ghcr.io/iqb-berlin/content-pool-frontend:${IMAGE_VERSION:-latest}
    container_name: content-pool-nginx
    ports:
      - "${APP_PORT:-80}:80"
      # - "443:443"  # Uncomment when using HTTPS with valid certificates
    volumes:
      - ./nginx.server.conf:/etc/nginx/conf.d/default.conf:ro
      # - /etc/letsencrypt:/etc/letsencrypt:ro   # Uncomment for HTTPS with Let's Encrypt
    depends_on:
      - content-pool-api
      - keycloak
    networks:
      - app-network
      - keycloak-network
    restart: unless-stopped

volumes:
  content-pool-db-data:
  uploads:
  keycloak-db-data:

networks:
  app-network:
  keycloak-network:

# Traefik edge overlay for production/server deployments.
#
# Use together with one production compose file:
#   docker compose -f docker-compose.server.yml -f docker-compose.traefik.yml up -d
#   docker compose -f docker-compose.prod.yml -f docker-compose.traefik.yml up -d --build
#
# Requires an already running Traefik instance on the same Docker host. For
# https://github.com/iqb-berlin/traefik, use its public ingress network
# "ingress-net". Do not attach ContentPool to Traefik's "app-net", because that
# network also contains Traefik's own Keycloak service.
services:
  nginx:
    # Traefik owns the public ports. Keep this nginx container internal-only.
    # Requires Docker Compose support for the Compose Spec !reset tag.
    ports: !reset []
    networks:
      traefik-ingress-net:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_DOCKER_NETWORK:-ingress-net}"

      # Edge security headers. ContentPool's nginx also sets app-level headers,
      # but HSTS belongs at the HTTPS edge.
      - "traefik.http.middlewares.content-pool-security.headers.stsSeconds=63072000"
      - "traefik.http.middlewares.content-pool-security.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.content-pool-security.headers.stsPreload=true"
      - "traefik.http.middlewares.content-pool-security.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.content-pool-security.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.content-pool-security.headers.browserXssFilter=true"
      - "traefik.http.middlewares.content-pool-security.headers.referrerPolicy=strict-origin-when-cross-origin"

      # Main application host. This routes the SPA, /api/, /assets/GeoGebra/,
      # and /auth/callback to ContentPool's internal nginx facade.
      - "traefik.http.routers.content-pool.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.content-pool.rule=Host(`${CONTENT_POOL_HOST:?CONTENT_POOL_HOST must be set}`) && !PathPrefix(`/realms`) && !PathPrefix(`/resources`)"
      - "traefik.http.routers.content-pool.middlewares=content-pool-security"
      - "traefik.http.routers.content-pool.priority=100"
      - "traefik.http.routers.content-pool.tls=true"
      - "traefik.http.routers.content-pool.tls.certresolver=${TRAEFIK_TLS_CERTRESOLVER:-}"
      - "traefik.http.routers.content-pool.service=content-pool"

      # Public Keycloak/OIDC browser endpoints. Keep /auth/* on the app host:
      # ContentPool uses /auth/callback as a frontend route.
      - "traefik.http.routers.content-pool-auth.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.content-pool-auth.rule=Host(`${CONTENT_POOL_AUTH_HOST:?CONTENT_POOL_AUTH_HOST must be set}`) && (PathPrefix(`/realms`) || PathPrefix(`/resources`))"
      - "traefik.http.routers.content-pool-auth.middlewares=content-pool-security"
      - "traefik.http.routers.content-pool-auth.priority=100"
      - "traefik.http.routers.content-pool-auth.tls=true"
      - "traefik.http.routers.content-pool-auth.tls.certresolver=${TRAEFIK_TLS_CERTRESOLVER:-}"
      - "traefik.http.routers.content-pool-auth.service=content-pool"

      - "traefik.http.services.content-pool.loadbalancer.server.port=80"

networks:
  traefik-ingress-net:
    external: true
    name: ${TRAEFIK_DOCKER_NETWORK:-ingress-net}

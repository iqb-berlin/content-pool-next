<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 240" role="img" aria-labelledby="title desc">
  <title id="title">IQB ContentPool Logo</title>
  <desc id="desc">Violet brandmark with IQB ContentPool wordmark</desc>

  <defs>

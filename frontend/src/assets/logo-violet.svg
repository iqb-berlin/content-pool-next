  <circle cx="161" cy="124" r="11" fill="none" stroke="#C4B5FD" stroke-width="1.6" stroke-opacity="0.35"/>
  <circle cx="161" cy="124" r="8.5" fill="#EDE9FE" stroke="#F5F3FF" stroke-width="1"/>
  <circle cx="163.1" cy="121.9" r="1.5" fill="#FFFFFF" opacity="0.72"/>
  <circle cx="150" cy="95" r="4.9" fill="#C4B5FD"/>

server {
    listen 80;
    server_name deine-domain.de;

    # Angular Frontend
    location / {
        proxy_pass http://content-pool-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API weiterleiten
    location /api/ {
        proxy_pass http://content-pool-api:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Für file uploads
        client_max_body_size 100M;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Optional: Proxy Keycloak through nginx (if you want to use /auth path instead of :8080)
    # Uncomment the following to access Keycloak at https://yourdomain.com/auth
    # location /auth/ {
    #     proxy_pass http://keycloak:8080/auth/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_buffering off;
    # }
}

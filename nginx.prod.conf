server {
    listen 80;
    server_name deine-domain.de;

    # Angular Frontend
    location / {
        proxy_pass http://content-pool-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API weiterleiten
    location /api/ {
        proxy_pass http://content-pool-api:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Für file uploads
        client_max_body_size 100M;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Keycloak OIDC endpoints proxy
    # Routes all /auth/* requests to Keycloak for OAuth/OIDC flows
    location /auth/ {
        proxy_pass https://keycloak:8443/auth/;
        proxy_ssl_verify off;  # Keycloak uses self-signed cert internally
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    # Keycloak admin console and API access (optional - restrict access in production)
    # location /admin/ {
    #     proxy_pass https://keycloak:8443/admin/;
    #     proxy_ssl_verify off;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto https;
    #     proxy_set_header X-Forwarded-Host $host;
    #     proxy_buffering off;
    #     # Optional: restrict to specific IP addresses
    #     # allow 10.0.0.0/8;
    #     # deny all;
    # }

    # Keycloak well-known endpoints (required for OIDC discovery)
    location /realms/ {
        proxy_pass https://keycloak:8443/realms/;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
    }

    # Keycloak resources (JS adapters, themes, etc.)
    location /resources/ {
        proxy_pass https://keycloak:8443/resources/;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Keycloak health check endpoint
    location /health/live {
        proxy_pass https://keycloak:8443/health/live;
        proxy_ssl_verify off;
        access_log off;
    }
}
